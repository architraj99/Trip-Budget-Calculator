<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Budget Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h2>Trip Budget Calculator</h2>
    </nav>

    <section class="container">

        <div class="calculator-card">

            <h1>Plan Your Trip Budget</h1>

            <div class="input-group">

                <label>Destination</label>
                <input type="text" id="destination">
            </div>

            <div class="input-group">

                <label>Number Of Travelers</label>
                <input type="number" id="travelers">
            </div>

            <div class="input-group">

                <label>Transport Cost</label>
                <input type="number" id="transport">
            </div>

            <div class="input-group">

                <label>Hotel Cost</label>
                <input type="number" id="hotel">
            </div>

            <div class="input-group">

                <label>Food Cost</label>
                <input type="number" id="food">
            </div>

            <div class="input-group">

                <label>Activities Cost</label>
                <input type="number" id="activities">
            </div>

            <div class="input-group">

                <label>Other Expenses</label>
                <input type="number" id="other">
            </div>

            <div class="input-group">

                <label>Planned Budget</label>
                <input type="number" id="budget">
            </div>

            <button id="calculateBtn">Calculate Expense</button>

        </div>

        <div class="result-card">

            <h2>Expense Summary</h2>

            <p id="totalExpense">Total Expense: ₹0</p>
            <p id="costPerPerson">Cost Per Person: ₹0</p>
            <p id="budgetRemaining">Budget Remaining: ₹0</p>
            <p id="budgetStatus"></p>
        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
