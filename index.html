<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <title>Trip Budget Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h2>Trip Budget Calculator</h2>
    </nav>

    <section class="container">

        <div class="calculator-card">

            <h1>Plan Your Trip Budget</h1>

            <div class="input-group">

                <label>Destination</label>
                <input type="text" placeholder="Enter Destination">
            </div>

            <div class="input-group">

                <label>Number Of Travellers</label>
                <input type="number" placeholder="Enter travellers">
            </div>

            <div class="input-group">

                <label>Transport Cost</label>
                <input type="number" placeholder="Enter transport cost">
            </div>

            <div class="input-group">

                <label>Hotel Cost</label>
                <input type="number" placeholder="Enter hotel cost">
            </div>

            <div class="input-group">

                <label>Food Cost</label>
                <input type="number" placeholder="Enter food cost">
            </div>

            <div class="input-group">

                <label>Activities Cost</label>
                <input type="number" placeholder="Enter activities cost">
            </div>

            <div class="input-group">

                <label>Other Expenses</label>
                <input type="number" placeholder="Enter other expenses">
            </div>

            <div class="input-group">

                <label>Planned Budget</label>
                <input type="number" placeholder="Enter Budget" >
            </div>

            <button>Calculate Expense</button>

        </div>

        <div class="result-card">

            <h2>Expense Summary</h2>

            <p>Total Expense: ₹0</p>
            <p>Cost per person: ₹0</p>
            <p>Budget Remaining: ₹0</p>
        </div>

    </section>

    <script src="script.js"></script>
    
</body>
</html>
